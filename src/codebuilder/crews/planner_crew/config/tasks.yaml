skeleton_task:
  description: >
    Produce a flat file-level skeleton for this project. You will NOT write
    code here. Enumerate the files the Writer agent must create or modify;
    a downstream task will bundle those files into cohesive work packages.

    Project name: {project_name}

    Brief:
    {brief}

    Goals:
    {goals}

    Tech stack hints from user:
    {tech_stack}

    Attachments materialized into the workspace (relative paths):
    {attachment_records}

    Workspace root (read-only for you): {workspace_dir}

    Prior work on this project (most recent first):
    {prior_history}

    Prior plan (only populated on revision; empty on first pass):
    {prior_plan}

    User amendments (only populated on revision; empty on first pass):
    {amendments}

    Rules:
    - Decide whether `mode` is "new_project" or "patch_existing" based on
      whether a git repo or zipped existing code was attached.
    - Set `domain` to the slug of your activated architecture-defining skill
      when one applies (e.g. "rpa"). Leave empty otherwise.
    - Apply the conventions described in your activated skills (project
      layout, required components, layering, testing strategy, naming) when
      shaping the file list. Activated skills are authoritative for
      project-type rules; do not invent extra structure when no skill calls
      for it.
    - Use the MINIMUM number of files that still respects the activated
      skill's structural rules. If the skill mandates one class per file
      for a layer (e.g. RPA domain entities, repository Protocols, use
      cases), each such class MUST be its own file. For things the skill
      does NOT mandate splitting (configuration, logging, CLI glue, package
      `__init__.py` files), keep cohesive code in one file. Do not fragment
      for fragmentation's sake.
    - Do not create package `__init__.py` files for every nested folder by
      default. Add them only when imports/exports need them or when the
      target package layout requires them.
    - For each file, emit a FileSkeleton entry: {{path, purpose (1-2
      sentences), change_type}}.
    - `change_type` is "modify" for any file already present in an attached
      repo / zip (only legal in `patch_existing` mode), and "create" for
      every new file. Mixed plans are normal in `patch_existing` mode.
    - Identify reference libraries. If the user attached a library (zip
      or git materialized under `inputs/`) clearly intended for the writer
      to import from rather than reimplement, record each top-level Python
      package name in `external_packages`. The import-completeness gate uses
      this list to stop treating those packages as missing modules.
    - Runtime configuration must come from explicit config files, env-backed
      settings, or a secret-store boundary. Never plan hardcoded
      credentials, tokens, or machine-specific paths.
    - Populate `open_questions` with anything the user must clarify later.
    - Populate `assumptions` with anything you decided on the user's behalf.
    - If prior history is present, treat it as authoritative about
      conventions and prior decisions on this project. Reuse files,
      patterns, and tech choices already established. Surface any conflicts
      with the current brief in `open_questions` rather than silently
      overriding.
  expected_output: >
    A PlanSkeleton JSON object matching the PlanSkeleton schema:
    project_name, mode, domain, tech_stack (list), files (list of
    FileSkeleton each with path/purpose/change_type), external_packages
    (list), open_questions (list), assumptions (list).
  agent: planner

expand_task:
  description: >
    Expand the skeleton into a full Plan whose subtasks are bundled work
    packages. A SubTask is NOT a single file anymore; each SubTask contains
    `files`, a list of 1 to 6 FileSkeleton entries that should be written
    together in one Writer kickoff.

    Project name: {project_name}

    Brief:
    {brief}

    Goals:
    {goals}

    Tech stack hints from user:
    {tech_stack}

    Attachments materialized into the workspace (relative paths):
    {attachment_records}

    Workspace root (read-only for you): {workspace_dir}

    User amendments (only populated on revision; empty on first pass):
    {amendments}

    Rules:
    - Every FileSkeleton entry from the skeleton MUST appear exactly once
      across the final Plan's `subtasks[*].files`.
    - Copy `mode`, `domain`, `tech_stack`, and `external_packages` from the
      skeleton onto the Plan unchanged.
    - Target 12-20 work packages for standard RPA projects. Hard cap:
      max 24 SubTasks total, max 6 files in any one SubTask. Prefer fewer
      work packages when the files are cohesive and can be safely written
      together.
    - Bundle by cohesive engineering slice, not by arbitrary folder count.
      Good RPA bundles are usually: project scaffold, domain entities,
      domain exceptions, domain Protocols, application DTOs/services, core
      use cases, persistence adapters, external integration adapters,
      producer/consumer/orchestrator wiring, grouped unit tests, grouped
      integration tests, and README/docs.
    - Keep tests in dedicated test work packages unless the user explicitly
      asks otherwise. Group tests by behavior/risk; do not mirror every
      production file with its own test file.
    - For each SubTask, fill in: id (stable, e.g. `s01`, `s02`, ...),
      title (short), description (what the writer should produce across all
      files), files (the exact FileSkeleton entries), tech_notes
      (implementation specifics; for `modify` files this MUST name the exact
      symbol to extract / rename / add / remove), test_criteria (acceptance
      checks for the whole bundle), depends_on (list of prior SubTask ids).
    - Order work packages so each package has a fair chance to pass lint
      and tests when written:
        1. Project scaffolding and package roots first.
        2. Shared primitives before modules that consume them.
        3. Domain files before application use cases.
        4. Ports/Protocols before infrastructure adapters.
        5. Use cases before orchestrator/producer/consumer wiring.
        6. Tests after related production behavior exists.
        7. README.md last.
    - Use `depends_on` only when one work package truly cannot start before
      another completes.
    - If the user submitted amendments, fold them into the revised plan.
      Keep unchanged work package ids stable; only modify what the feedback
      requires.
  expected_output: >
    A Plan JSON object matching the Plan schema: project_name, mode,
    tech_stack (list), subtasks (list of SubTask, each with id, title,
    description, files (list of FileSkeleton), depends_on, tech_notes,
    test_criteria), open_questions (list), assumptions (list), domain
    (slug of the architecture-defining skill or empty string),
    external_packages (list).
  agent: planner
