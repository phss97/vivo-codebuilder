skeleton_task:
  description: >
    Produce a flat file-level skeleton for this project. You will NOT write
    code here. Enumerate the files the Writer agent must create or modify;
    a downstream task will bundle those files into cohesive work packages.

    Project name: {project_name}

    Brief:
    {brief}

    Goals:
    {goals}

    Tech stack hints from user:
    {tech_stack}

    Output language (override-or-detect): {language}

    Attachments materialized into the workspace (relative paths):
    {attachment_records}

    Workspace root (read-only for you): {workspace_dir}

    Prior work on this project (most recent first):
    {prior_history}

    Patch preflight QA report (only populated for attached existing projects):
    {preflight_qa_report}

    Prior plan (only populated on revision; empty on first pass):
    {prior_plan}

    User amendments (only populated on revision; empty on first pass):
    {amendments}

    Rules:
    - LANGUAGE: Determine the natural language of the brief and goals. If the
      "Output language" above names a concrete language, use it; otherwise
      infer it from the brief. Set the PlanSkeleton `language` field to that
      language's name (e.g. "Portuguese", "English"), and write ALL narrative
      fields (`purpose`, `assumptions`, `open_questions`) in that language.
    - Decide whether `mode` is "new_project" or "patch_existing" based on
      whether a git repo or zipped existing code was attached.
    - SCOPE (patch_existing): a patch is a SURGICAL set of edits, not a
      re-description of the whole project. FIRST inspect the attached project
      with `workspace_list` and `workspace_read` only; paths are relative to
      the workspace root. Read the files the brief is about, then plan ONLY the
      files the brief requires creating or modifying. Do NOT enumerate files
      that need no change, and do NOT re-list the whole project "for
      completeness". Files you only need to READ for context (to learn a real
      symbol, signature, or field) must NOT appear as FileSkeleton entries —
      they are not written; the writer is given their real APIs separately. A
      typical patch touches a handful of files, not dozens. The unchanged rest
      of the project is preserved automatically in the final deliverable.
    - Set `domain` to the slug of your activated architecture-defining skill
      when one applies (e.g. "rpa"). Leave empty otherwise.
    - PACKAGING (RPA new_project only): the plan MUST include, as planned
      files, a real entry-script module (`src/<pkg>/__main__.py` or a root
      `launcher.py` that calls the orchestrator `main()`), `build.spec`
      (PyInstaller spec), a Windows build script (`build.ps1` and/or
      `build.bat`), and a README packaging section — and `pyinstaller` MUST be
      a dev dependency in `pyproject.toml`. These ship the Windows `.exe` build
      kit. Omitting any of them fails the RPA acceptance gate.
    - Apply the conventions described in your activated skills (project
      layout, required components, layering, testing strategy, naming) when
      shaping the file list. Activated skills are authoritative for
      project-type rules; do not invent extra structure when no skill calls
      for it.
    - Use the MINIMUM number of files that still respects the activated
      skill's structural rules. If the skill mandates one class per file
      for a layer (e.g. RPA domain entities, repository Protocols, use
      cases), each such class MUST be its own file. For things the skill
      does NOT mandate splitting (configuration, logging, CLI glue, package
      `__init__.py` files), keep cohesive code in one file. Do not fragment
      for fragmentation's sake.
    - Do not create package `__init__.py` files for every nested folder by
      default. Add them only when imports/exports need them or when the
      target package layout requires them.
    - For each file, emit a FileSkeleton entry: {{path, purpose (1-2
      sentences), change_type}}.
    - `change_type` is "modify" for any file already present in an attached
      repo / zip (only legal in `patch_existing` mode), and "create" for
      every new file. Mixed plans are normal in `patch_existing` mode.
    - PATHS in `patch_existing` mode: every FileSkeleton `path` MUST be
      relative to the attached project's root (the cloned repo / extracted
      zip directory under `inputs/`), NEVER prefixed with `inputs/<dir>/`.
      E.g. if the attachment materialized at `inputs/my-app/src/pkg/mod.py`,
      plan the path as `src/pkg/mod.py`. New files in `patch_existing` mode
      also live under that same project root — never plan a parallel tree
      outside the attached project.
    - Patch plans MUST name concrete production/test/build files to create or
      modify. Never emit placeholder paths such as
      `FILES_TO_BE_DETERMINED_BY_*`, `TESTS_TO_BE_DETERMINED_BY_*`, `TBD`, or
      diagnostic-only markdown work packages. Use the preflight QA report to
      identify the real failing files and tests.
    - Identify reference libraries. If the user attached a library (zip
      or git materialized under `inputs/`) clearly intended for the writer
      to import from rather than reimplement, record each top-level Python
      package name in `external_packages`. The import-completeness gate uses
      this list to stop treating those packages as missing modules.
    - Runtime configuration must come from explicit config files, env-backed
      settings, or a secret-store boundary. Never plan hardcoded
      credentials, tokens, or machine-specific paths.
    - Prefer ASSUMPTIONS over questions. When the brief leaves a detail open,
      make the industry-standard choice, record it in `assumptions`, and move
      on — the user reviews the plan and can amend anything you assumed.
    - Use `open_questions` ONLY for blocking decisions you cannot safely
      assume — where a wrong guess would invalidate the deliverable (e.g.
      which system of record to integrate against, a credential/access
      dependency). Maximum 3. When nothing truly blocks, return an EMPTY
      `open_questions` list; never pad it with nice-to-know questions.
    - If prior history is present, treat it as authoritative about
      conventions and prior decisions on this project. Reuse files,
      patterns, and tech choices already established. Surface any conflicts
      with the current brief in `open_questions` rather than silently
      overriding.
  expected_output: >
    A PlanSkeleton JSON object matching the PlanSkeleton schema:
    project_name, mode, domain, language (the detected/overridden language
    name), tech_stack (list), files (list of FileSkeleton each with
    path/purpose/change_type and optional public_api), external_packages
    (list), open_questions (list), assumptions (list).
  agent: planner

expand_task:
  description: >
    Expand the skeleton into a full Plan whose subtasks are bundled work
    packages. A SubTask is NOT a single file anymore; each SubTask contains
    `files`, a list of 1 to 8 FileSkeleton entries that should be written
    together in one Writer kickoff.

    Project name: {project_name}

    Brief:
    {brief}

    Goals:
    {goals}

    Tech stack hints from user:
    {tech_stack}

    Output language (override-or-detect): {language}

    Attachments materialized into the workspace (relative paths):
    {attachment_records}

    Workspace root (read-only for you): {workspace_dir}

    User amendments (only populated on revision; empty on first pass):
    {amendments}

    Patch preflight QA report (only populated for attached existing projects):
    {preflight_qa_report}

    Rules:
    - LANGUAGE: write ALL narrative fields (`description`, `tech_notes`,
      `test_criteria`, `assumptions`, `open_questions`) in the same language
      carried on the skeleton's `language` field. Copy that `language` value
      onto the Plan unchanged.
    - Every FileSkeleton entry from the skeleton MUST appear exactly once
      across the final Plan's `subtasks[*].files`, with its `public_api`
      preserved.
    - PATHS in `patch_existing` mode: keep every `path` relative to the
      attached project's root (the repo / extracted zip directory under
      `inputs/`) — never prefixed with `inputs/<dir>/`, and never a parallel
      tree outside the attached project.
    - Patch plans MUST name concrete production/test/build files to create or
      modify. Do not create diagnostic-only subtasks, investigation reports, or
      placeholder paths/names; use the preflight QA output and workspace reads
      to choose the real files.
    - For every FileSkeleton that exports importable code, `public_api` MUST
      list the exact function/class/constant names WITH signatures (e.g.
      "create_registro(data: dict) -> Registro", "class RegistroRepository
      (Protocol)"). These names are BINDING: any file that imports from or
      calls into this file must use exactly these names — no synonyms,
      abbreviations, or renames (never plan `create_registro` here and let a
      caller use `build_registro`). Leave `public_api` empty only for files
      with no importable API (README, .env.example, pyproject.toml,
      build.spec, build scripts).
    - Copy `mode`, `domain`, `language`, `tech_stack`, and `external_packages`
      from the skeleton onto the Plan unchanged.
    - PACKAGING (RPA new_project only): carry the build-kit files from the
      skeleton (entry script, `build.spec`, Windows build script, README
      packaging section) into the Plan's subtasks, and keep `pyinstaller` in
      the dev dependencies. The RPA acceptance gate fails without them.
    - SIZING depends on mode. For `new_project`, target 12-20 work packages for
      a standard full RPA build. For `patch_existing`, plan ONLY as many work
      packages as the requested changes actually require (typically 1-10) — a
      patch is scoped to the changed files, NEVER padded to a target, and never
      re-builds the whole project. Hard cap either way: max 24 SubTasks total,
      max 8 files in any one SubTask. Prefer fewer work packages when the files
      are cohesive and can be safely written together.
    - Bundle by cohesive engineering slice, not by arbitrary folder count.
      Good RPA bundles are usually: project scaffold, domain entities,
      domain exceptions, domain Protocols, application DTOs/services, core
      use cases, persistence adapters, external integration adapters,
      producer/consumer/orchestrator wiring, grouped unit tests, grouped
      integration tests, and README/docs.
    - Keep tests in dedicated test work packages unless the user explicitly
      asks otherwise. Group tests by behavior/risk; do not mirror every
      production file with its own test file.
    - For each SubTask, fill in: id (stable, e.g. `s01`, `s02`, ...),
      title (short), description (what the writer should produce across all
      files), files (the exact FileSkeleton entries), tech_notes
      (implementation specifics; for `modify` files this MUST name the exact
      symbol to extract / rename / add / remove), test_criteria (acceptance
      checks for the whole bundle), depends_on (list of prior SubTask ids).
    - Order work packages so each package has a fair chance to pass lint
      and tests when written:
        1. Project scaffolding and package roots first.
        2. Shared primitives before modules that consume them.
        3. Domain files before application use cases.
        4. Ports/Protocols before infrastructure adapters.
        5. Use cases before orchestrator/producer/consumer wiring.
        6. Tests after related production behavior exists.
        7. README.md last.
    - Use `depends_on` only when one work package truly cannot start before
      another completes.
    - If the user submitted amendments, fold them into the revised plan.
      Keep unchanged work package ids stable; only modify what the feedback
      requires.
  expected_output: >
    A Plan JSON object matching the Plan schema: project_name, mode, language
    (the language name copied from the skeleton), tech_stack (list), subtasks
    (list of SubTask, each with id, title, description, files (list of
    FileSkeleton, each with path/purpose/change_type and a populated
    public_api for files that export importable code), depends_on, tech_notes,
    test_criteria), open_questions (list), assumptions (list), domain
    (slug of the architecture-defining skill or empty string),
    external_packages (list).
  agent: planner

amend_task:
  description: >
    Revise an EXISTING plan to fold in the user's amendments. You are NOT
    re-planning the project from scratch — start from the prior plan below and
    change ONLY what the amendments require. This is a surgical edit, not a
    rewrite.

    Project name: {project_name}

    Brief (for reference only — do not re-plan from it):
    {brief}

    Prior plan (your base — edit this, keep everything else byte-for-byte):
    {prior_plan}

    User amendments to fold in:
    {amendments}

    Patch preflight QA report (only populated for attached existing projects):
    {preflight_qa_report}

    Rules:
    - Treat the prior plan as authoritative. Carry every existing work package
      forward UNCHANGED unless an amendment specifically requires editing it.
    - Keep stable `id`s. Do not renumber or reorder existing work packages.
      Only edit the `files`, `description`, `tech_notes`, `test_criteria`, or
      `depends_on` of a package that an amendment actually touches.
    - Add new work packages only when the amendments introduce work that does
      not fit an existing package. Give new packages fresh ids that continue
      the existing sequence (e.g. if the plan ends at `s21`, add `s22`).
    - Remove a work package only when an amendment makes it obsolete.
    - PATHS in `patch_existing` mode: keep every `path` relative to the
      attached project's root (the repo / extracted zip directory under
      `inputs/`) — never prefixed with `inputs/<dir>/`, and never a parallel
      tree outside the attached project.
    - Do not add diagnostic-only work packages or placeholder paths/names.
      Every added patch work package must name concrete files to edit.
    - Copy `mode`, `domain`, `language`, `tech_stack`, and `external_packages`
      from the prior plan unchanged unless an amendment changes them (e.g. the
      user confirms internal packages that should now appear in
      `external_packages`, or names concrete SAP transactions / queue names
      that belong in the relevant work package's `tech_notes`). Write any
      new or edited narrative in the prior plan's `language`.
    - Carry each file's `public_api` forward UNCHANGED. Update a file's
      `public_api` only when an amendment changes that file's exported
      symbols, and populate `public_api` for any new files that export
      importable code (exact names with signatures — these are binding, no
      synonyms in callers).
    - Resolve any `open_questions` that the amendments answer: move the decided
      detail into the affected work package's `tech_notes`/`description` and
      drop the answered question. Record any new decision you made on the
      user's behalf in `assumptions`.
    - Respect the same structural caps as the original plan: at most 24 work
      packages total and at most 8 files in any one package. If folding in the
      amendments would exceed a cap, consolidate cohesive files rather than
      dropping required work.
    - Return the COMPLETE plan: every work package, not just the changed ones.
      The downstream build iterates the full `subtasks` list, so an omitted
      package is a dropped feature.
  expected_output: >
    A Plan JSON object matching the Plan schema: project_name, mode, language
    (carried from the prior plan), tech_stack (list), subtasks (list of
    SubTask, each with id, title, description, files (list of FileSkeleton,
    each with path/purpose/change_type and public_api), depends_on,
    tech_notes, test_criteria), open_questions (list), assumptions (list),
    domain (slug of the architecture-defining skill or empty string),
    external_packages (list). It must contain EVERY work package from the
    prior plan (edited or carried forward unchanged), plus any new ones the
    amendments require.
  agent: planner
