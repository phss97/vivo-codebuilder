write_task:
  description: >
    Implement this subtask by writing the full contents of a single file.

    Subtask:
    {subtask}

    Workspace root: {workspace_dir}
    Relative paths already present in the workspace you should consult before
    writing:
    {workspace_listing}

    User amendments from the plan approval step (may be empty):
    {amendments}

    Prior review feedback to incorporate (only populated on retry; may be empty):
    {prior_review_issues}

    Rules:
    - Write ONE file whose path is exactly `file_path` from the subtask.
    - Include complete, runnable code — no placeholders, no `...`.
    - Follow the conventions in your activated skills (project structure,
      layering, naming, testing patterns) when implementing this file.
      Activated skills are authoritative for domain-specific rules; do not
      mix concerns the skill says should be separated.
    - Runtime configuration must come from explicit config objects, env-backed
      settings, or secret-store adapter boundaries. Never hardcode secrets,
      credentials, tokens, or local absolute paths.
    - Do NOT embed tests inside a production module. Tests belong in a
      `tests/` file, which the planner schedules as its own subtask. If
      `file_path` is under `tests/`, write tests there; otherwise write
      production code only.
    - Return the FULL file text in CodeArtifact.content. The orchestrator
      persists it to the workspace — you do NOT need to call
      `workspace_write` to save the final file. Use `workspace_read` and
      `workspace_list` to inspect adjacent files first when helpful.
  expected_output: >
    A CodeArtifact JSON object with: subtask_id, file_path (must match the
    subtask), content set to the COMPLETE file text (non-empty), language,
    tests_included.
  agent: writer

repair_task:
  description: >
    Final QA failed after all planned subtasks were written. Repair the
    workspace by changing exactly one file that is most likely responsible
    for the failing lint or test output.

    Workspace root: {workspace_dir}

    Plan summary:
    {plan_summary}

    Current workspace files:
    {workspace_listing}

    Final QA report:
    {qa_report}

    Rules:
    - Use workspace_read and workspace_list to inspect the failing code before
      choosing the file to change.
    - Return the FULL repaired file text in CodeArtifact.content. The
      orchestrator persists it — you do NOT need to call `workspace_write`.
    - Prefer fixing production code when tests reveal a product bug; only edit
      tests when the tests themselves are clearly wrong or incomplete.
    - Do not add placeholders, TODOs, or `...`.
    - Do not create broad rewrites unrelated to the QA failure.
  expected_output: >
    A CodeArtifact JSON object with: subtask_id set to "final_qa_repair",
    file_path set to the repaired file path, content set to the COMPLETE
    repaired file text (non-empty), language, and tests_included.
  agent: writer
