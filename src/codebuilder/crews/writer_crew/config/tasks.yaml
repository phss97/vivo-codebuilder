write_task:
  description: >
    Implement this bundled work package by writing the full contents of every
    planned file in the subtask.

    Subtask:
    {subtask}

    Change type: {change_type}

    Output language for ALL comments, docstrings, log messages, and
    user-facing strings: {language}

    Project symbol contract — the EXACT public names, class fields, and
    signatures of the files you depend on. The "REAL APIs" section is extracted
    from the actual code already on disk, so it is authoritative: when you
    import a symbol, access an attribute/field, or call a function/constructor
    from another project file, use exactly these names and parameters. Never
    invent an attribute or a synonym (e.g. if Settings lists `sap_endpoint`,
    never write `settings.sap_host`):
    {dependency_contracts}

    Workspace root: {workspace_dir}
    Relative paths already present in the workspace you should consult before
    writing:
    {workspace_listing}

    User amendments from the plan approval step (may be empty):
    {amendments}

    Prior review feedback to incorporate (only populated on retry; may be empty):
    {prior_review_issues}

    Existing planned file contents (only populated for planned files whose
    change_type is "modify"):
    {existing_contents}

    Rules:
    - LANGUAGE: Write ALL code comments, docstrings, log messages, and
      user-facing string literals in {language}. This OVERRIDES any other
      language present in your activated skills or context. Identifiers
      (function/class/variable names) follow the project's conventions and the
      symbol contract — do NOT translate them; only natural-language text
      follows {language}.
    - NAMES: Each file MUST export EXACTLY the symbols listed in its own
      `public_api` (same names and signatures — no renames, abbreviations, or
      synonyms). When importing from or calling another project file, use the
      EXACT name given in the project symbol contract above (if the contract
      says `create_registro`, never call it `build_registro`). Mismatched
      names break imports and fail review.
    - Return exactly one CodeArtifact per entry in `subtask.files`.
    - Each CodeArtifact.file_path MUST exactly match one planned file path.
      Do not create extra files, omit planned files, or rename paths.
    - For each file with `change_type` = "modify":
        * Apply the transformation described in the subtask
          (`description`/`tech_notes`/amendments) to that file.
        * Return the COMPLETE modified file in CodeArtifact.content.
        * The returned content MUST differ materially from the existing
          content for that file. Returning the file unchanged will fail review.
        * If the existing block looks truncated or stale, call `workspace_read`
          on that file path to confirm the latest content before writing.
    - For each file with `change_type` = "create", write it from scratch.
    - Include complete, runnable code — no placeholders, no `...`.
    - Follow the conventions in your activated skills (project structure,
      layering, naming, testing patterns). Activated skills are authoritative
      for domain-specific rules.
    - Do NOT embed tests inside a production module. If a planned file path is
      under `tests/`, write tests there; otherwise write production or support
      code only.
    - Tests MUST call the real production API contract already on disk. Before
      writing a test assertion, use the project symbol contract above (and
      `workspace_read` only when needed) to match actual constructor
      signatures, method names, fields, and Protocol methods. Do not invent
      test-only names or alternate arguments.
    - Return the FULL file text for every artifact in CodeArtifact.content.
      The orchestrator persists the bundle to disk — you do NOT need to call
      `workspace_write` to save the final files. The symbol contract above
      already gives you the real APIs of your dependencies, so do NOT spelunk
      the workspace: call `workspace_read` only for a specific file whose detail
      you genuinely need and the contract does not provide.
  expected_output: >
    A CodeBundleArtifact JSON object with: subtask_id, artifacts (list of
    CodeArtifact). Each CodeArtifact must include subtask_id, file_path
    matching one planned path, content set to the COMPLETE file text,
    language, and tests_included.
  agent: writer

repair_task:
  description: >
    Final QA failed after all planned subtasks were written. Repair the
    workspace by fixing EVERY file implicated by the failing lint, test, and
    type-check output — not just one. Cross-file symbol drift (an import,
    attribute, keyword argument, or method name that disagrees between where a
    symbol is defined and where it is used) typically requires editing several
    files together, so return all of them in one bundle.

    Workspace root: {workspace_dir}

    Output language for ALL comments, docstrings, log messages, and
    user-facing strings: {language}

    Project symbol contract — the EXACT public names every file exports; use
    them verbatim when importing or calling, never a synonym:
    {dependency_contracts}

    Plan summary:
    {plan_summary}

    Current workspace files:
    {workspace_listing}

    Final QA report (lint_output, test_output, type_output — the mypy
    `type_output` names the file:line and the exact drifted symbol):
    {qa_report}

    Rules:
    - LANGUAGE: write all comments, docstrings, log messages, and user-facing
      strings in {language}; do not translate identifiers.
    - COVERAGE: read the lint, test, AND type_output sections. Identify every
      file named in a failure and fix all of them in this one pass. Returning
      only one file when several are broken leaves the job failing.
    - GROUND TRUTH: before changing a caller, `workspace_read` the file that
      DEFINES the symbol (e.g. the settings/config or Protocol module) and make
      the caller match the real attribute names, field names, and constructor
      signature found there. Never invent a name — read it.
    - NAMES: when fixing imports or calls, use the EXACT names defined at the
      source — never substitute a synonym or a guessed attribute.
    - Prefer fixing production code when tests reveal a product bug; only edit
      tests when the tests themselves are clearly wrong or incomplete.
    - Return the FULL repaired file text for each fixed file in
      CodeArtifact.content. The orchestrator persists the bundle — you do NOT
      need to call `workspace_write`.
    - Do not add placeholders, TODOs, or `...`. Do not rewrite files unrelated
      to the QA failure.
  expected_output: >
    A CodeBundleArtifact JSON object with: subtask_id set to "final_qa_repair",
    and artifacts (a list of one CodeArtifact per fixed file). Each CodeArtifact
    must set subtask_id to "final_qa_repair", file_path to the repaired file
    path, content to the COMPLETE repaired file text (non-empty), language, and
    tests_included.
  agent: writer
