write_task:
  description: >
    Implement this bundled work package by writing the full contents of every
    planned file in the subtask.

    Subtask:
    {subtask}

    Change type: {change_type}

    Workspace root: {workspace_dir}
    Relative paths already present in the workspace you should consult before
    writing:
    {workspace_listing}

    User amendments from the plan approval step (may be empty):
    {amendments}

    Prior review feedback to incorporate (only populated on retry; may be empty):
    {prior_review_issues}

    Existing planned file contents (only populated for planned files whose
    change_type is "modify"):
    {existing_contents}

    Rules:
    - Return exactly one CodeArtifact per entry in `subtask.files`.
    - Each CodeArtifact.file_path MUST exactly match one planned file path.
      Do not create extra files, omit planned files, or rename paths.
    - For each file with `change_type` = "modify":
        * Apply the transformation described in the subtask
          (`description`/`tech_notes`/amendments) to that file.
        * Return the COMPLETE modified file in CodeArtifact.content.
        * The returned content MUST differ materially from the existing
          content for that file. Returning the file unchanged will fail review.
        * If the existing block looks truncated or stale, call `workspace_read`
          on that file path to confirm the latest content before writing.
    - For each file with `change_type` = "create", write it from scratch.
    - Include complete, runnable code — no placeholders, no `...`.
    - Follow the conventions in your activated skills (project structure,
      layering, naming, testing patterns). Activated skills are authoritative
      for domain-specific rules.
    - Do NOT embed tests inside a production module. If a planned file path is
      under `tests/`, write tests there; otherwise write production or support
      code only.
    - Return the FULL file text for every artifact in CodeArtifact.content.
      The orchestrator persists the bundle to disk — you do NOT need to call
      `workspace_write` to save the final files. Use `workspace_read` and
      `workspace_list` to inspect adjacent files first when helpful.
  expected_output: >
    A CodeBundleArtifact JSON object with: subtask_id, artifacts (list of
    CodeArtifact). Each CodeArtifact must include subtask_id, file_path
    matching one planned path, content set to the COMPLETE file text,
    language, and tests_included.
  agent: writer

repair_task:
  description: >
    Final QA failed after all planned subtasks were written. Repair the
    workspace by changing exactly one file that is most likely responsible
    for the failing lint or test output.

    Workspace root: {workspace_dir}

    Plan summary:
    {plan_summary}

    Current workspace files:
    {workspace_listing}

    Final QA report:
    {qa_report}

    Rules:
    - Use workspace_read and workspace_list to inspect the failing code before
      choosing the file to change.
    - Return the FULL repaired file text in CodeArtifact.content. The
      orchestrator persists it — you do NOT need to call `workspace_write`.
    - Prefer fixing production code when tests reveal a product bug; only edit
      tests when the tests themselves are clearly wrong or incomplete.
    - Do not add placeholders, TODOs, or `...`.
    - Do not create broad rewrites unrelated to the QA failure.
  expected_output: >
    A CodeArtifact JSON object with: subtask_id set to "final_qa_repair",
    file_path set to the repaired file path, content set to the COMPLETE
    repaired file text (non-empty), language, and tests_included.
  agent: writer
