review_task:
  description: >
    Review this CodeBundleArtifact and decide whether it passes.

    Subtask:
    {subtask}

    Artifact bundle to review:
    {artifact}

    Deterministic failure output that triggered this review:
    {deterministic_issues}

    Workspace root: {workspace_dir}

    Use the `workspace_read` and `workspace_list` tools to read every file
    listed in the bundle and any related files in the workspace. Run the
    `lint_runner` tool against each artifact path, and run `test_runner` for
    paths under `tests/`. Apply the acceptance criteria from the
    `code-review-gate` skill.

    Write all `issues` and `suggestions` in {language}.
  expected_output: >
    A ReviewResult JSON object with: subtask_id (matching the bundle),
    passed (bool), issues (list of concrete problems), suggestions (list of
    recommended improvements).
  agent: reviewer

qa_task:
  description: >
    Run final QA on the whole workspace at {workspace_dir}.

    Plan metadata:
    {plan_summary}

    Steps:
    1. Use `lint_runner` with path "." to lint the entire workspace.
    2. Use `test_runner` with path "." to run pytest.
    3. Use `workspace_list` to check the documented entry point from the plan
       actually exists.
    4. Assess integration coherence across the generated files.

    If any step fails, set `passed=False` and include the failing output.
  expected_output: >
    A QAReport JSON object with: passed (bool), lint_output (raw), test_output
    (raw), integration_notes (narrative summary of what you checked).
  agent: qa_agent

architecture_gate_task:
  description: >
    Run the final architecture acceptance gate for the generated workspace
    at {workspace_dir}. The gate is keyed on the project's declared domain.

    Domain: {domain}

    Plan metadata:
    {plan_summary}

    Current workspace files:
    {workspace_listing}

    Apply the activated domain skill (matching the `domain` slug above) plus
    the `code-review-gate` skill. Inspect the generated project against the
    architecture, layering, configuration boundary, traceability, and testing
    requirements defined by those skills.

    Set passed=False if any required quality from the domain skill is missing,
    even if ruff and pytest passed.

    Write all `issues` and `suggestions` in {language}.
  expected_output: >
    A ReviewResult JSON object with subtask_id set to "architecture_gate",
    passed (bool), issues (concrete missing or incorrect items), and
    suggestions (targeted remediation steps).
  agent: qa_agent
